<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sun Prime CRM PRO</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; }
</style>

</head>

<body class="bg-slate-900 text-white">

<div class="max-w-7xl mx-auto p-5">

<h1 class="text-2xl font-semibold mb-4">⚡ Sun Prime CRM</h1>

<!-- TOPBAR -->
<div class="flex flex-wrap gap-2 mb-6">
  <button onclick="testeLead()" class="bg-blue-600 px-4 py-2 rounded-lg hover:bg-blue-500">+ Lead</button>
  <button onclick="toggleTema()" class="bg-gray-700 px-4 py-2 rounded-lg">Tema</button>
  <button onclick="toggleSom()" class="bg-gray-700 px-4 py-2 rounded-lg">Som</button>
</div>

<!-- DASHBOARD -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
  <div class="bg-slate-800 p-4 rounded-xl">
    <p class="text-sm opacity-70">Total Leads</p>
    <h2 id="total" class="text-2xl font-bold">0</h2>
  </div>

  <div class="bg-slate-800 p-4 rounded-xl">
    <p class="text-sm opacity-70">Em Atendimento</p>
    <h2 id="att" class="text-2xl font-bold">0</h2>
  </div>

  <div class="bg-slate-800 p-4 rounded-xl">
    <p class="text-sm opacity-70">Finalizados</p>
    <h2 id="fin" class="text-2xl font-bold">0</h2>
  </div>
</div>

<!-- PIPELINE -->
<div class="grid md:grid-cols-3 gap-4">

<div class="bg-slate-800 p-4 rounded-xl">
<h2 class="mb-3">🟡 Novos</h2>
<div id="novo"></div>
</div>

<div class="bg-slate-800 p-4 rounded-xl">
<h2 class="mb-3">🔵 Atendimento</h2>
<div id="atendimento"></div>
</div>

<div class="bg-slate-800 p-4 rounded-xl">
<h2 class="mb-3">🟢 Finalizados</h2>
<div id="finalizado"></div>
</div>

</div>

</div>

<audio id="som">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>
const API="https://sunprime-painel.vercel.app/api/pedidos";

let somAtivo=true;
let ids=new Set();

function toggleTema(){
 document.body.classList.toggle("bg-white");
 document.body.classList.toggle("text-black");
}

function toggleSom(){
 somAtivo=!somAtivo;
 alert(somAtivo?"Som ON":"Som OFF");
}

function corTempo(s){
 if(s<60)return "border-green-500";
 if(s<300)return "border-yellow-400";
 return "border-red-500";
}

function tempo(data){
 const s=(Date.now()-new Date(data))/1000;
 if(s<60)return Math.floor(s)+"s";
 if(s<3600)return Math.floor(s/60)+"m";
 return Math.floor(s/3600)+"h";
}

function testeLead(){
 fetch(API,{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    nome:"Cliente",
    telefone:"81999999999",
    cidade:"Recife",
    status:"novo",
    criadoEm:new Date().toISOString()
  })
 });
}

function atualizar(id,status){
 fetch(API,{
  method:"PUT",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({id,status})
 });
}

function render(dados){

 novo.innerHTML="";
 atendimento.innerHTML="";
 finalizado.innerHTML="";

 let total=dados.length;
 let att=0;
 let fin=0;

 dados.forEach(d=>{

  if(!ids.has(d.id)){
    ids.add(d.id);
    if(somAtivo) document.getElementById("som").play();
  }

  if(d.status==="em atendimento")att++;
  if(d.status==="finalizado")fin++;

  let s=(Date.now()-new Date(d.criadoEm))/1000;

  let card=document.createElement("div");
  card.className=`bg-slate-700 p-3 rounded-lg mb-3 border-l-4 ${corTempo(s)} hover:scale-[1.02] transition`;

  card.innerHTML=`
    <div class="flex justify-between mb-1">
      <strong>${d.nome}</strong>
      <span class="text-xs opacity-70">${d.status}</span>
    </div>

    <div class="text-sm opacity-80">
      📞 ${d.telefone}<br>
      📍 ${d.cidade}
    </div>

    <div class="text-xs mt-1 opacity-60">
      ⏱ ${tempo(d.criadoEm)}
    </div>

    <div class="mt-2 flex gap-1">
      <button onclick="atualizar(${d.id},'em atendimento')" class="bg-blue-600 px-2 py-1 rounded text-xs">Atender</button>
      <button onclick="atualizar(${d.id},'finalizado')" class="bg-green-600 px-2 py-1 rounded text-xs">Finalizar</button>
    </div>
  `;

  if(d.status==="novo")novo.appendChild(card);
  else if(d.status==="em atendimento")atendimento.appendChild(card);
  else finalizado.appendChild(card);

 });

 document.getElementById("total").innerText=total;
 document.getElementById("att").innerText=att;
 document.getElementById("fin").innerText=fin;
}

function carregar(){
 fetch(API).then(r=>r.json()).then(render);
}

setInterval(carregar,3000);
carregar();
</script>

</body>
</html>
