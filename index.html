<!DOCTYPE html>
<html>
<head>
  <title>Sun Prime SaaS</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #0b1220;
      color: #e2e8f0;
      padding: 20px;
    }

    .topbar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 8px;
      border-radius: 8px;
      cursor: pointer;
    }

    .container {
      display: flex;
      gap: 20px;
    }

    .coluna {
      flex: 1;
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 12px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 10px;
      border-left: 4px solid;
      backdrop-filter: blur(10px);
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .novo { border-color: #f59e0b; }
    .atendimento { border-color: #3b82f6; }
    .finalizado { border-color: #10b981; }

    .tempo {
      font-size: 12px;
      opacity: 0.7;
      margin-top: 5px;
    }

    .hidden { display: none; }

  </style>

</head>
<body>

<h2>⚡ Sun Prime SaaS</h2>

<div class="topbar">
  <button onclick="testeLead()">+ Lead</button>
  <button onclick="trocarAba('pipeline')">Pipeline</button>
  <button onclick="trocarAba('finalizados')">Finalizados</button>
</div>

<div id="pipeline">
  <div class="container">
    <div class="coluna"><h3>🟡 Novos</h3><div id="novo"></div></div>
    <div class="coluna"><h3>🔵 Atendimento</h3><div id="atendimento"></div></div>
  </div>
</div>

<div id="finalizados" class="hidden">
  <h3>🟢 Finalizados</h3>
  <div id="finalizado"></div>
</div>

<script>
const API = "https://sunprime-painel.vercel.app/api/pedidos";

let ids = new Set();

// formatar data
function formatar(data) {
  if (!data) return "";
  const d = new Date(data);
  return d.toLocaleDateString() + " " + d.toLocaleTimeString();
}

// trocar aba
function trocarAba(aba) {
  document.getElementById("pipeline").classList.add("hidden");
  document.getElementById("finalizados").classList.add("hidden");
  document.getElementById(aba).classList.remove("hidden");
}

// gerar
function testeLead() {
  fetch(API, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      nome: "Cliente",
      telefone: "81999999999",
      cidade: "Recife",
      status: "novo",
      criadoEm: new Date().toISOString()
    })
  });
}

// atualizar
function atualizar(id, status) {

  let payload = { id, status };

  if (status === "finalizado") {
    payload.finalizadoEm = new Date().toISOString();
  }

  fetch(API, {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(payload)
  });
}

// render SEM apagar
function render(dados) {

  dados.forEach(d => {

    let card = document.getElementById("lead-" + d.id);

    if (!card) {
      card = document.createElement("div");
      card.id = "lead-" + d.id;
      card.className = "card";

      card.innerHTML = `
        <strong>${d.nome}</strong><br>
        ${d.telefone}<br>
        ${d.cidade}

        <div class="tempo" id="tempo-${d.id}"></div>

        <div style="margin-top:10px">
          <button onclick="atualizar(${d.id}, 'em atendimento')">Atender</button>
          <button onclick="atualizar(${d.id}, 'finalizado')">Finalizar</button>
        </div>
      `;
    }

    // classe
    card.classList.remove("novo","atendimento","finalizado");
    card.classList.add(d.status);

    // mover
    if (d.status === "novo")
      document.getElementById("novo").prepend(card);

    else if (d.status === "em atendimento")
      document.getElementById("atendimento").prepend(card);

    else
      document.getElementById("finalizado").prepend(card);

    // atualizar datas
    const tempoEl = document.getElementById("tempo-" + d.id);

    tempoEl.innerHTML = `
      📅 ${formatar(d.criadoEm)}<br>
      ${d.finalizadoEm ? "✅ " + formatar(d.finalizadoEm) : ""}
    `;
  });
}

// loop
function carregar() {
  fetch(API).then(r=>r.json()).then(render);
}

setInterval(carregar, 3000);
carregar();
</script>

</body>
</html>
