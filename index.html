<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sun Prime CRM PRO</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; }

.dragging {
  opacity: 0.5;
  transform: rotate(2deg) scale(1.02);
}

.coluna.drag-over {
  background: rgba(255,255,255,0.05);
}
</style>

</head>

<body class="bg-slate-900 text-white">

<div class="max-w-7xl mx-auto p-5">

<h1 class="text-2xl font-semibold mb-4">⚡ Sun Prime CRM PRO</h1>

<div class="flex gap-2 mb-6">
  <button onclick="testeLead()" class="bg-blue-600 px-4 py-2 rounded-lg">+ Lead</button>
</div>

<!-- DASHBOARD -->
<div class="grid md:grid-cols-3 gap-4 mb-6">
  <div class="bg-slate-800 p-4 rounded-xl">
    <p class="text-sm opacity-70">Total</p>
    <h2 id="total" class="text-2xl font-bold">0</h2>
  </div>
  <div class="bg-slate-800 p-4 rounded-xl">
    <p class="text-sm opacity-70">Atendimento</p>
    <h2 id="att" class="text-2xl font-bold">0</h2>
  </div>
  <div class="bg-slate-800 p-4 rounded-xl">
    <p class="text-sm opacity-70">Finalizados</p>
    <h2 id="fin" class="text-2xl font-bold">0</h2>
  </div>
</div>

<!-- PIPELINE -->
<div class="grid md:grid-cols-3 gap-4">

<div class="coluna bg-slate-800 p-4 rounded-xl" data-status="novo">
<h2>🟡 Novos</h2>
<div id="novo"></div>
</div>

<div class="coluna bg-slate-800 p-4 rounded-xl" data-status="em atendimento">
<h2>🔵 Atendimento</h2>
<div id="atendimento"></div>
</div>

<div class="coluna bg-slate-800 p-4 rounded-xl" data-status="finalizado">
<h2>🟢 Finalizados</h2>
<div id="finalizado"></div>
</div>

</div>

</div>

<audio id="som">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>
const API="https://sunprime-painel.vercel.app/api/pedidos";

let ids=new Set();
const elementos={};
let dragged=null;

// tempo
function tempo(data){
 const s=(Date.now()-new Date(data))/1000;
 if(s<60)return Math.floor(s)+"s";
 if(s<3600)return Math.floor(s/60)+"m";
 return Math.floor(s/3600)+"h";
}

// SLA
function corTempo(s){
 if(s<60)return "border-green-500";
 if(s<300)return "border-yellow-400";
 return "border-red-500";
}

// criar lead
function testeLead(){
 fetch(API,{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    nome:"Cliente",
    telefone:"81999999999",
    cidade:"Recife",
    status:"novo",
    criadoEm:new Date().toISOString()
  })
 });
}

// atualizar
function atualizar(id,status){
 fetch(API,{
  method:"PUT",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({id,status})
 });
}

// DRAG
function setupDrag(card,id){
 card.draggable=true;

 card.addEventListener("dragstart",()=>{
   dragged={id,card};
   card.classList.add("dragging");
 });

 card.addEventListener("dragend",()=>{
   card.classList.remove("dragging");
 });
}

// DROP
document.querySelectorAll(".coluna").forEach(col=>{
 col.addEventListener("dragover",e=>{
   e.preventDefault();
   col.classList.add("drag-over");
 });

 col.addEventListener("dragleave",()=>{
   col.classList.remove("drag-over");
 });

 col.addEventListener("drop",()=>{
   col.classList.remove("drag-over");

   if(dragged){
     const status=col.dataset.status;
     atualizar(dragged.id,status);
     col.querySelector("div").prepend(dragged.card);
   }
 });
});

// render
function render(dados){

 let total=dados.length;
 let att=0;
 let fin=0;

 dados.forEach(d=>{

  if(!ids.has(d.id)){
    ids.add(d.id);
    document.getElementById("som").play();
  }

  if(d.status==="em atendimento") att++;
  if(d.status==="finalizado") fin++;

  let card=elementos[d.id];

  if(!card){
    card=document.createElement("div");
    elementos[d.id]=card;
    setupDrag(card,d.id);
  }

  let s=(Date.now()-new Date(d.criadoEm))/1000;

  card.className=`bg-slate-700 p-3 rounded-lg mb-3 border-l-4 ${corTempo(s)} transition`;

  card.innerHTML=`
    <div class="flex justify-between">
      <strong>${d.nome}</strong>
      <span class="text-xs opacity-70">${d.status}</span>
    </div>

    <div class="text-sm opacity-80">
      📞 ${d.telefone}<br>
      📍 ${d.cidade}
    </div>

    <div class="text-xs opacity-60 mt-1">
      ⏱ ${tempo(d.criadoEm)}
    </div>
  `;

  if(d.status==="novo") novo.appendChild(card);
  else if(d.status==="em atendimento") atendimento.appendChild(card);
  else finalizado.appendChild(card);

 });

 document.getElementById("total").innerText=total;
 document.getElementById("att").innerText=att;
 document.getElementById("fin").innerText=fin;
}

// loop
function carregar(){
 fetch(API).then(r=>r.json()).then(render);
}

setInterval(carregar,3000);
carregar();
</script>

</body>
</html>
