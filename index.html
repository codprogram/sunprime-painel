<!DOCTYPE html>
<html>
<head>
  <title>Sun Prime - Painel</title>
</head>
<body>

<h2>⚡ Painel de Leads Sun Prime</h2>

<h3 id="contador">Total de Leads: 0</h3>

<button onclick="testeLead()">➕ Gerar Lead de Teste</button>

<div id="lista"></div>

<script>
const API = "https://sunprime-painel.vercel.app/api/pedidos";

// GERAR LEAD DE TESTE
function testeLead() {
  fetch(API, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      nome: "Cliente Teste",
      telefone: "81999999999",
      cidade: "Recife",
      status: "novo"
    })
  })
  .then(function(res) {
    return res.json();
  })
  .then(function() {
    carregar();
  })
  .catch(function() {
    alert("Erro ao enviar");
  });
}

// ATUALIZAR STATUS
function atualizar(id, status) {
  fetch(API, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ id, status })
  })
  .then(function() {
    carregar();
  });
}

// CARREGAR LISTA
function carregar() {
  fetch(API)
    .then(function(res) {
      return res.json();
    })
    .then(function(dados) {

      const lista = document.getElementById('lista');
      lista.innerHTML = '';

      document.getElementById("contador").innerText =
        "Total de Leads: " + dados.length;

      dados.forEach(function(d) {

        let cor = "#ccc";
        if (d.status === "novo") cor = "orange";
        if (d.status === "em atendimento") cor = "blue";
        if (d.status === "finalizado") cor = "green";

        const div = document.createElement('div');

        div.innerHTML =
          "<div style='border-left: 6px solid " + cor + "; padding:10px; margin:10px 0; background:#f9f9f9'>" +
          "<strong>👤 " + (d.nome || "Cliente") + "</strong><br>" +
          "📱 " + (d.telefone || "") + "<br>" +
          "📍 " + (d.cidade || "") + "<br>" +
          "📊 Status: " + (d.status || "novo") + "<br><br>" +

          "<button onclick='atualizar(" + d.id + ", \"em atendimento\")'>Atender</button> " +
          "<button onclick='atualizar(" + d.id + ", \"finalizado\")'>Finalizar</button>" +
          "</div>";

        lista.appendChild(div);
      });

    })
    .catch(function() {
      alert("Erro ao carregar dados");
    });
}

// ATUALIZA AUTOMÁTICO
setInterval(carregar, 2000);
carregar();

</script>

</body>
</html>
