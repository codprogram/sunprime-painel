<!DOCTYPE html>
<html>
<head>
  <title>Sun Prime - Pipeline</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0b1220;
      color: #e2e8f0;
      padding: 20px;
    }

    h2 {
      font-size: 22px;
      margin-bottom: 5px;
    }

    #contador {
      color: #94a3b8;
      margin-bottom: 20px;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #1d4ed8;
    }

    .container {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .coluna {
      flex: 1;
      background: #111827;
      border-radius: 12px;
      padding: 15px;
      min-height: 400px;
    }

    .coluna h3 {
      margin-bottom: 15px;
      font-size: 16px;
      color: #cbd5f5;
    }

    .card {
      background: #020617;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
      border-left: 5px solid;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .tempo {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 6px;
    }

    .acoes {
      margin-top: 10px;
    }

    .acoes button {
      background: #1e293b;
      margin-right: 5px;
    }

    .novo { border-left-color: #f59e0b; }
    .atendimento { border-left-color: #3b82f6; }
    .finalizado { border-left-color: #10b981; }
  </style>

</head>
<body>

<h2>⚡ Sun Prime - Pipeline</h2>
<div id="contador">Total: 0</div>

<button onclick="testeLead()">+ Novo Lead</button>

<div class="container">

  <div class="coluna">
    <h3>🟡 Novos</h3>
    <div id="novo"></div>
  </div>

  <div class="coluna">
    <h3>🔵 Em Atendimento</h3>
    <div id="atendimento"></div>
  </div>

  <div class="coluna">
    <h3>🟢 Finalizados</h3>
    <div id="finalizado"></div>
  </div>

</div>

<script>
const API = "https://sunprime-painel.vercel.app/api/pedidos";

function testeLead() {
  fetch(API, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      nome: "Cliente",
      telefone: "81999999999",
      cidade: "Recife",
      status: "novo",
      criadoEm: new Date().toISOString()
    })
  });
}

function atualizar(id, status) {
  fetch(API, {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ id, status })
  });
}

function tempo(data) {
  const diff = Math.floor((Date.now() - new Date(data)) / 1000);
  if (diff < 60) return diff + "s";
  if (diff < 3600) return Math.floor(diff/60) + "m";
  return Math.floor(diff/3600) + "h";
}

function render(dados) {

  document.getElementById("contador").innerText =
    "Total: " + dados.length;

  dados.forEach(d => {

    let card = document.getElementById("lead-" + d.id);

    let classe = "novo";
    if (d.status === "em atendimento") classe = "atendimento";
    if (d.status === "finalizado") classe = "finalizado";

    if (!card) {
      card = document.createElement("div");
      card.id = "lead-" + d.id;
      card.className = "card " + classe;

      card.innerHTML = `
        <strong>${d.nome}</strong><br>
        ${d.telefone}<br>
        ${d.cidade}

        <div class="tempo" id="tempo-${d.id}"></div>

        <div class="acoes">
          <button onclick="atualizar(${d.id}, 'em atendimento')">Atender</button>
          <button onclick="atualizar(${d.id}, 'finalizado')">Finalizar</button>
        </div>
      `;

      mover(card, d.status);
    }

    // atualizar status visual
    card.className = "card " + classe;

    mover(card, d.status);

    // atualizar tempo
    const t = document.getElementById("tempo-" + d.id);
    if (t) t.innerText = "⏱ " + tempo(d.criadoEm);

  });
}

function mover(card, status) {
  const destino =
    status === "novo" ? "novo" :
    status === "em atendimento" ? "atendimento" : "finalizado";

  if (card.parentElement?.id !== destino) {
    document.getElementById(destino).appendChild(card);
  }
}

function carregar() {
  fetch(API)
    .then(res => res.json())
    .then(render);
}

setInterval(carregar, 3000);
carregar();
</script>

</body>
</html>
