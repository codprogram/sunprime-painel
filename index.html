<!DOCTYPE html>
<html>
<head>
  <title>Sun Prime - Painel</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h2 {
      margin-bottom: 20px;
    }

    #contador {
      margin-bottom: 20px;
      color: #94a3b8;
    }

    .container {
      display: flex;
      gap: 20px;
    }

    .coluna {
      flex: 1;
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      min-height: 400px;
    }

    .coluna h3 {
      margin-bottom: 15px;
    }

    .card {
      background: #020617;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      border-left: 6px solid #334155;
    }

    .tempo {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 5px;
    }

    button {
      margin-top: 8px;
      padding: 6px 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-right: 5px;
    }

    .novo { border-left: 6px solid #f59e0b; }
    .atendimento { border-left: 6px solid #3b82f6; }
    .finalizado { border-left: 6px solid #10b981; }
  </style>

</head>
<body>

<h2>⚡ Sun Prime - Painel</h2>
<h3 id="contador">Total: 0</h3>

<button onclick="testeLead()">➕ Gerar Lead</button>

<div class="container">

  <div class="coluna">
    <h3>🟡 Novos</h3>
    <div id="novos"></div>
  </div>

  <div class="coluna">
    <h3>🔵 Em Atendimento</h3>
    <div id="atendimento"></div>
  </div>

  <div class="coluna">
    <h3>🟢 Finalizados</h3>
    <div id="finalizados"></div>
  </div>

</div>

<script>
const API = "https://sunprime-painel.vercel.app/api/pedidos";
let cache = [];

// GERAR LEAD
function testeLead() {
  fetch(API, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      nome: "Cliente Teste",
      telefone: "81999999999",
      cidade: "Recife",
      status: "novo",
      criadoEm: new Date().toISOString()
    })
  }).then(carregar);
}

// ATUALIZAR STATUS
function atualizar(id, status) {
  fetch(API, {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ id, status })
  }).then(carregar);
}

// TEMPO
function tempoDecorrido(data) {
  const agora = new Date();
  const criado = new Date(data);
  const diff = Math.floor((agora - criado) / 1000);

  if (diff < 60) return diff + "s";
  if (diff < 3600) return Math.floor(diff/60) + " min";
  return Math.floor(diff/3600) + " h";
}

// LIMPAR COLUNAS
function limparColunas() {
  document.getElementById("novos").innerHTML = "";
  document.getElementById("atendimento").innerHTML = "";
  document.getElementById("finalizados").innerHTML = "";
}

// RENDER
function renderizar(dados) {
  limparColunas();

  dados.forEach(d => {

    const tempo = d.criadoEm ? tempoDecorrido(d.criadoEm) : "";

    const div = document.createElement("div");
    div.className = "card";

    if (d.status === "novo") div.classList.add("novo");
    if (d.status === "em atendimento") div.classList.add("atendimento");
    if (d.status === "finalizado") div.classList.add("finalizado");

    div.innerHTML = `
      <strong>👤 ${d.nome || "Cliente"}</strong><br>
      📱 ${d.telefone || ""}<br>
      📍 ${d.cidade || ""}<br>
      <div class="tempo">⏱ ${tempo}</div>

      <button onclick="atualizar(${d.id}, 'em atendimento')">Atender</button>
      <button onclick="atualizar(${d.id}, 'finalizado')">Finalizar</button>
    `;

    if (d.status === "novo") {
      document.getElementById("novos").appendChild(div);
    } else if (d.status === "em atendimento") {
      document.getElementById("atendimento").appendChild(div);
    } else {
      document.getElementById("finalizados").appendChild(div);
    }
  });
}

// CARREGAR
function carregar() {
  fetch(API)
    .then(res => res.json())
    .then(dados => {
      cache = dados;

      document.getElementById("contador").innerText =
        "Total de Leads: " + dados.length;

      renderizar(dados);
    });
}

// ATUALIZA TEMPO
setInterval(() => {
  cache.forEach(d => {
    const elementos = document.querySelectorAll(".tempo");
    elementos.forEach(el => {
      if (d.criadoEm) {
        el.innerText = "⏱ " + tempoDecorrido(d.criadoEm);
      }
    });
  });
}, 1000);

// ATUALIZA API
setInterval(carregar, 5000);

carregar();
</script>

</body>
</html>
