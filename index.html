<!DOCTYPE html>
<html>
<head>
  <title>Sun Prime - Painel</title>
</head>
<body>

<h2>⚡ Painel de Leads Sun Prime</h2>

<button onclick="testeLead()">➕ Gerar Lead de Teste</button>

<div id="lista"></div>

<script>
const API = "https://sunprime-painel.vercel.app/api/pedidos";

function testeLead() {
  alert("clicou");

  fetch(API, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      nome: "Cliente Teste",
      telefone: "81999999999",
      cidade: "Recife",
      status: "novo"
    })
  })
  .then(function(res) {
    return res.json();
  })
  .then(function(data) {
    console.log("✅ Enviado:", data);
  })
  .catch(function(err) {
    console.error("❌ Erro:", err);
  });
}
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      nome: "Cliente Teste",
      telefone: "81999999999",
      cidade: "Recife",
      status: "novo"
    })
  });
}

async function carregar() {
  try {
    const res = await fetch(API);
    const dados = await res.json();

    const lista = document.getElementById('lista');
    lista.innerHTML = '';

    dados.forEach(function(d) {
      const div = document.createElement('div');

      div.innerHTML =
        "<hr>" +
        "👤 " + (d.nome || "Cliente") + "<br>" +
        "📱 " + (d.telefone || "") + "<br>" +
        "📍 " + (d.cidade || "") + "<br>" +
        "📊 Status: " + (d.status || "novo") + "<br>";

      lista.appendChild(div);
    });

  } catch (e) {
    console.error("Erro:", e);
  }
}

setInterval(carregar, 2000);
carregar();
</script>

</body>
</html>
