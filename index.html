<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sun Prime CRM V2</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b1220;
  --card:rgba(255,255,255,0.05);
  --text:#e2e8f0;
  --primary:#2563eb;
}

body{
  font-family:'Inter';
  background:var(--bg);
  color:var(--text);
  padding:20px;
}

.page{max-width:1400px;margin:auto;}

.card{
  background:var(--card);
  border-radius:16px;
  padding:15px;
  backdrop-filter:blur(10px);
}

.summary-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  margin-bottom:20px;
}

.summary-card strong{
  font-size:22px;
}

.layout{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.panel h2{margin-bottom:10px;}

.lead-card{
  background:rgba(255,255,255,0.03);
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  border-left:5px solid;
}

.card-header{
  display:flex;
  justify-content:space-between;
}

.badge{
  font-size:12px;
  opacity:.7;
}

.card-actions button{
  margin-top:8px;
  margin-right:5px;
  padding:5px 8px;
  border:none;
  border-radius:6px;
  background:var(--primary);
  color:white;
  cursor:pointer;
}

.topbar{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

button{
  background:var(--primary);
  border:none;
  padding:8px 12px;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

@media(max-width:900px){
  .layout{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="page">

<h2>⚡ Sun Prime CRM</h2>

<div class="topbar">
  <button onclick="testeLead()">+ Lead</button>
</div>

<!-- DASHBOARD -->
<div class="summary-grid">
  <div class="summary-card card">Leads<br><strong id="total"></strong></div>
  <div class="summary-card card">Atendimento<br><strong id="att"></strong></div>
  <div class="summary-card card">Finalizados<br><strong id="fin"></strong></div>
</div>

<!-- PIPELINE -->
<div class="layout">

<div class="card panel">
<h2>🟡 Novos</h2>
<div id="novo"></div>
</div>

<div class="card panel">
<h2>🔵 Atendimento</h2>
<div id="atendimento"></div>
</div>

<div class="card panel">
<h2>🟢 Finalizados</h2>
<div id="finalizado"></div>
</div>

</div>

</div>

<script>
const API="https://sunprime-painel.vercel.app/api/pedidos";

let cache={};
let ids=new Set();

Notification.requestPermission();

// SLA cor
function corTempo(seg){
  if(seg<60)return "#10b981";
  if(seg<300)return "#f59e0b";
  return "#ef4444";
}

function tempo(data){
  const s=(Date.now()-new Date(data))/1000;
  if(s<60)return Math.floor(s)+"s";
  if(s<3600)return Math.floor(s/60)+"m";
  return Math.floor(s/3600)+"h";
}

// criar lead teste
function testeLead(){
 fetch(API,{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    nome:"Cliente",
    telefone:"81999999999",
    cidade:"Recife",
    status:"novo",
    criadoEm:new Date().toISOString()
  })
 });
}

// assumir lead
function assumir(id){
 atualizar(id,"em atendimento");
}

// atualizar
function atualizar(id,status){
 fetch(API,{
  method:"PUT",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({id,status})
 });
}

// render
function render(dados){

 document.getElementById("novo").innerHTML="";
 document.getElementById("atendimento").innerHTML="";
 document.getElementById("finalizado").innerHTML="";

 let total=dados.length;
 let att=0;
 let fin=0;

 dados.forEach(d=>{

  cache[d.id]=d;

  if(!ids.has(d.id)){
    ids.add(d.id);
    if(Notification.permission==="granted"){
      new Notification("Novo Lead",{body:d.nome});
    }
  }

  if(d.status==="em atendimento")att++;
  if(d.status==="finalizado")fin++;

  let card=document.createElement("div");
  card.className="lead-card";

  let segundos=(Date.now()-new Date(d.criadoEm))/1000;
  card.style.borderLeftColor=corTempo(segundos);

  card.innerHTML=`
    <div class="card-header">
      <strong>${d.nome}</strong>
      <span class="badge">${d.status}</span>
    </div>

    <div>📞 ${d.telefone}</div>
    <div>📍 ${d.cidade}</div>
    <div>👤 ${d.responsavel || "Livre"}</div>

    <div>⏱ ${tempo(d.criadoEm)}</div>

    <div class="card-actions">
      <button onclick="assumir(${d.id})">Atender</button>
      <button onclick="atualizar(${d.id},'finalizado')">Finalizar</button>
    </div>
  `;

  if(d.status==="novo")novo.appendChild(card);
  else if(d.status==="em atendimento")atendimento.appendChild(card);
  else finalizado.appendChild(card);

 });

 document.getElementById("total").innerText=total;
 document.getElementById("att").innerText=att;
 document.getElementById("fin").innerText=fin;
}

// loop
function carregar(){
 fetch(API).then(r=>r.json()).then(render);
}

setInterval(carregar,3000);
carregar();
</script>

</body>
</html>
