<!DOCTYPE html>
<html>
<head>
  <title>Sun Prime - Painel</title>
</head>
<body>

<h2>⚡ Painel de Leads Sun Prime</h2>

<button onclick="testeLead()">➕ Gerar Lead de Teste</button>

<div id="lista"></div>

<script>
const API = "https://sunprime-painel.vercel.app/api/pedidos";

// BOTÃO TESTE
function testeLead() {
  alert("clicou");

  fetch(API, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      nome: "Cliente Teste",
      telefone: "81999999999",
      cidade: "Recife",
      status: "novo"
    })
  })
  .then(function(res) {
    return res.json();
  })
  .then(function(data) {
    alert("✅ Lead enviado!");
    carregar(); // atualiza lista na hora
  })
  .catch(function(err) {
    alert("❌ Erro ao enviar");
  });
}

// CARREGAR LISTA
function carregar() {
  fetch(API)
    .then(function(res) {
      return res.json();
    })
    .then(function(dados) {
      const lista = document.getElementById('lista');
      lista.innerHTML = '';

      dados.forEach(function(d) {
        const div = document.createElement('div');

        div.innerHTML =
          "<hr>" +
          "👤 " + (d.nome || "Cliente") + "<br>" +
          "📱 " + (d.telefone || "") + "<br>" +
          "📍 " + (d.cidade || "") + "<br>" +
          "📊 Status: " + (d.status || "novo") + "<br>";

        lista.appendChild(div);
      });
    })
    .catch(function(err) {
      alert("Erro ao carregar dados");
    });
}

// ATUALIZA AUTOMÁTICO
setInterval(carregar, 2000);
carregar();

</script>

</body>
</html>
