<!DOCTYPE html>
<html>
<head>
  <title>Sun Prime - SaaS</title>

  <style>
    body {
      font-family: -apple-system, sans-serif;
      background: #0b1220;
      color: #e2e8f0;
      padding: 20px;
    }

    h2 { margin-bottom: 5px; }

    #contador {
      color: #94a3b8;
      margin-bottom: 20px;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    .container {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .coluna {
      flex: 1;
      background: #111827;
      border-radius: 12px;
      padding: 15px;
    }

    .card {
      background: #020617;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
      border-left: 5px solid;
      transition: 0.3s;
      animation: fadeIn 0.3s ease;
    }

    .novo { border-left-color: #f59e0b; }
    .atendimento { border-left-color: #3b82f6; }
    .finalizado { border-left-color: #10b981; }

    .tempo {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 5px;
    }

    .novoLead {
      box-shadow: 0 0 10px #f59e0b;
      animation: pulse 1s infinite alternate;
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to { transform: scale(1.03); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

  </style>

</head>
<body>

<h2>⚡ Sun Prime - SaaS</h2>
<div id="contador">Total: 0</div>

<button onclick="testeLead()">+ Lead</button>

<div class="container">
  <div class="coluna"><h3>🟡 Novos</h3><div id="novo"></div></div>
  <div class="coluna"><h3>🔵 Atendimento</h3><div id="atendimento"></div></div>
  <div class="coluna"><h3>🟢 Finalizado</h3><div id="finalizado"></div></div>
</div>

<audio id="som">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>
const API = "https://sunprime-painel.vercel.app/api/pedidos";

let idsExistentes = new Set();

// GERAR LEAD
function testeLead() {
  fetch(API, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      nome: "Cliente",
      telefone: "81999999999",
      cidade: "Recife",
      status: "novo",
      criadoEm: new Date().toISOString()
    })
  });
}

// STATUS
function atualizar(id, status) {
  fetch(API, {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ id, status })
  });
}

// TEMPO
function tempo(data) {
  const diff = Math.floor((Date.now() - new Date(data)) / 1000);
  if (diff < 60) return diff + "s";
  if (diff < 3600) return Math.floor(diff/60) + "m";
  return Math.floor(diff/3600) + "h";
}

// RENDER
function render(dados) {

  document.getElementById("contador").innerText =
    "Total: " + dados.length;

  // ordena mais novo primeiro
  dados.sort((a, b) => new Date(b.criadoEm) - new Date(a.criadoEm));

  dados.forEach(d => {

    let card = document.getElementById("lead-" + d.id);

    let classe = "novo";
    if (d.status === "em atendimento") classe = "atendimento";
    if (d.status === "finalizado") classe = "finalizado";

    let novoLead = false;

    if (!idsExistentes.has(d.id)) {
      novoLead = true;
      idsExistentes.add(d.id);
      document.getElementById("som").play();
    }

    if (!card) {
      card = document.createElement("div");
      card.id = "lead-" + d.id;
      card.className = "card " + classe;

      if (novoLead) card.classList.add("novoLead");

      card.innerHTML = `
        <strong>${d.nome}</strong><br>
        ${d.telefone}<br>
        ${d.cidade}

        <div class="tempo" id="tempo-${d.id}"></div>

        <div style="margin-top:10px">
          <button onclick="atualizar(${d.id}, 'em atendimento')">Atender</button>
          <button onclick="atualizar(${d.id}, 'finalizado')">Finalizar</button>
        </div>
      `;

      mover(card, d.status);
    }

    card.className = "card " + classe;

    mover(card, d.status);

    const t = document.getElementById("tempo-" + d.id);
    if (t) t.innerText = "⏱ " + tempo(d.criadoEm);

  });
}

// MOVE
function mover(card, status) {
  const destino =
    status === "novo" ? "novo" :
    status === "em atendimento" ? "atendimento" : "finalizado";

  if (card.parentElement?.id !== destino) {
    document.getElementById(destino).prepend(card);
  }
}

// LOOP
function carregar() {
  fetch(API)
    .then(res => res.json())
    .then(render);
}

setInterval(carregar, 3000);
carregar();
</script>

</body>
</html>
