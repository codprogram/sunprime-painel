<!DOCTYPE html>
<html>
<head>
  <title>Sun Prime SaaS</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #0b1220;
      color: #e2e8f0;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.03);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 10px;
      border-left: 4px solid;
    }

    .novo { border-color: #f59e0b; }
    .atendimento { border-color: #3b82f6; }
    .finalizado { border-color: #10b981; }

    .tempo {
      font-size: 12px;
      opacity: 0.7;
      margin-top: 5px;
    }

  </style>

</head>
<body>

<h2>⚡ Sun Prime SaaS</h2>

<button onclick="testeLead()">+ Lead</button>

<h3>🟡 Novos</h3>
<div id="novo"></div>

<h3>🔵 Atendimento</h3>
<div id="atendimento"></div>

<h3>🟢 Finalizados</h3>
<div id="finalizado"></div>

<script>
const API = "https://sunprime-painel.vercel.app/api/pedidos";

// FORMATA DATA
function formatar(data) {
  const d = new Date(data);
  return d.toLocaleDateString() + " " + d.toLocaleTimeString();
}

// GERAR
function testeLead() {
  fetch(API, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      nome: "Cliente",
      telefone: "81999999999",
      cidade: "Recife",
      status: "novo",
      criadoEm: new Date().toISOString()
    })
  });
}

// ATUALIZAR
function atualizar(id, status) {

  let payload = { id, status };

  if (status === "finalizado") {
    payload.finalizadoEm = new Date().toISOString();
  }

  fetch(API, {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(payload)
  });
}

// RENDER
function render(dados) {

  document.getElementById("novo").innerHTML = "";
  document.getElementById("atendimento").innerHTML = "";
  document.getElementById("finalizado").innerHTML = "";

  dados.forEach(d => {

    const div = document.createElement("div");
    div.className = "card " + d.status;

    div.innerHTML = `
      <strong>${d.nome}</strong><br>
      ${d.telefone}<br>
      ${d.cidade}

      <div class="tempo">
        📅 Criado: ${formatar(d.criadoEm)}<br>
        ${d.finalizadoEm ? "✅ Finalizado: " + formatar(d.finalizadoEm) : ""}
      </div>

      <button onclick="atualizar(${d.id}, 'em atendimento')">Atender</button>
      <button onclick="atualizar(${d.id}, 'finalizado')">Finalizar</button>
    `;

    document.getElementById(d.status).appendChild(div);
  });
}

// LOOP
function carregar() {
  fetch(API).then(r=>r.json()).then(render);
}

setInterval(carregar, 3000);
carregar();
</script>

</body>
</html>
