<!DOCTYPE html>
<html>
<head>
  <title>Sun Prime - Pipeline</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .container {
      display: flex;
      gap: 20px;
    }

    .coluna {
      flex: 1;
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      min-height: 400px;
    }

    .card {
      background: #020617;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      border-left: 6px solid;
    }

    .tempo {
      font-size: 12px;
      color: #94a3b8;
    }
  </style>

</head>
<body>

<h2>⚡ Sun Prime - Pipeline</h2>
<h3 id="contador">Total: 0</h3>

<button onclick="testeLead()">➕ Lead</button>

<div class="container">
  <div class="coluna"><h3>🟡 Novos</h3><div id="novo"></div></div>
  <div class="coluna"><h3>🔵 Atendimento</h3><div id="atendimento"></div></div>
  <div class="coluna"><h3>🟢 Finalizado</h3><div id="finalizado"></div></div>
</div>

<script>
const API = "https://sunprime-painel.vercel.app/api/pedidos";
let cache = {};

// GERAR
function testeLead() {
  fetch(API, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      nome: "Cliente",
      telefone: "81999999999",
      cidade: "Recife",
      status: "novo",
      criadoEm: new Date().toISOString()
    })
  });
}

// STATUS
function atualizar(id, status) {
  fetch(API, {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ id, status })
  });
}

// TEMPO
function tempo(data) {
  const diff = Math.floor((Date.now() - new Date(data)) / 1000);
  if (diff < 60) return diff + "s";
  if (diff < 3600) return Math.floor(diff/60) + "m";
  return Math.floor(diff/3600) + "h";
}

// RENDER
function atualizarUI(dados) {

  document.getElementById("contador").innerText =
    "Total: " + dados.length;

  dados.forEach(d => {

    let card = document.getElementById("lead-" + d.id);

    let cor = "#f59e0b";
    if (d.status === "em atendimento") cor = "#3b82f6";
    if (d.status === "finalizado") cor = "#10b981";

    if (!card) {
      card = document.createElement("div");
      card.id = "lead-" + d.id;
      card.className = "card";

      card.innerHTML = `
        <strong>${d.nome}</strong><br>
        ${d.telefone}<br>
        ${d.cidade}<br>
        <div class="tempo" id="tempo-${d.id}"></div>

        <button onclick="atualizar(${d.id}, 'em atendimento')">Atender</button>
        <button onclick="atualizar(${d.id}, 'finalizado')">Finalizar</button>
      `;

      document.getElementById(
        d.status === "novo" ? "novo" :
        d.status === "em atendimento" ? "atendimento" : "finalizado"
      ).appendChild(card);
    }

    // mover de coluna
    const destino =
      d.status === "novo" ? "novo" :
      d.status === "em atendimento" ? "atendimento" : "finalizado";

    if (card.parentElement.id !== destino) {
      document.getElementById(destino).appendChild(card);
    }

    // atualizar cor
    card.style.borderLeft = "6px solid " + cor;

    // atualizar tempo
    const t = document.getElementById("tempo-" + d.id);
    if (t) t.innerText = "⏱ " + tempo(d.criadoEm);
  });
}

// API
function carregar() {
  fetch(API)
    .then(res => res.json())
    .then(dados => atualizarUI(dados));
}

// LOOP
setInterval(carregar, 3000);
carregar();
</script>

</body>
</html>
