<script>
const API = "/api/pedidos";

async function testeLead() {
  alert("clicou");

  await fetch(API, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      nome: "Cliente Teste",
      telefone: "81999999999",
      cidade: "Recife",
      status: "novo"
    })
  });
}

async function carregar() {
  const res = await fetch(API);
  const dados = await res.json();

  const lista = document.getElementById('lista');
  lista.innerHTML = '';

  dados.forEach(d => {
    const div = document.createElement('div');

    div.innerHTML = `
      <hr>
      👤 ${d.nome || 'Cliente'}<br>
      📱 ${d.telefone || ''}<br>
      📍 ${d.cidade || ''}<br>
      📊 Status: ${d.status || 'novo'}<br>
    `;

    lista.appendChild(div);
  });
}

setInterval(carregar, 2000);
carregar();
</script>
